services:
  server:
    build:
      context: ../../..
      dockerfile: ts/examples/sandbox/Dockerfile
    environment:
      SMELTER_API_PORT: "9091"
      SMELTER_WHIP_WHEP_SERVER_PORT: "9092"
      SMELTER_LOGGER_FORMAT: compact
      SMELTER_STDIO_LOGGER_LEVEL: "info,smelter_core::pipeline::decoder=debug,smelter_core::pipeline::webrtc::whip_input=debug,smelter_core::audio_mixer=debug"
      ENVIRONMENT: production
    ports:
      # Smelter API
      - 9091:9091
      # Smelter WebRTC
      - 9092:9092
    gpus: 'all'
    runtime: 'nvidia'

