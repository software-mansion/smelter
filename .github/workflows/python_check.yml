name: Python SDK - check

on:
    workflow_dispatch: {}
    push:
        branches: [master]
        paths:
            - 'sdks/python/**'
            - '.github/workflows/python_check.yml'
    pull_request:
        types: [opened, synchronize]
        paths:
            - 'sdks/python/**'
            - '.github/workflows/python_check.yml'

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
    python_check:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repo
              uses: actions/checkout@v6

            - name: Install uv
              uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true

            - name: Install project dependencies
              working-directory: ./sdks/python
              run: uv sync --locked

            - name: Lint
              working-directory: ./sdks/python
              run: uv run ruff check .

            - name: Format check
              working-directory: ./sdks/python
              run: uv run ruff format --check .

            - name: Typecheck
              working-directory: ./sdks/python
              run: uv run ty check

    python_test:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.11", "3.12", "3.13"]

        steps:
            - name: Checkout repo
              uses: actions/checkout@v6

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v6
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install smelter-sdk + test deps
              working-directory: ./sdks/python/lib
              run: pip install -e . pytest pytest-asyncio

            - name: Test
              working-directory: ./sdks/python/lib
              run: pytest tests
